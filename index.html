        <!-- Main content -->

            <div class="w-full max-w-2xl">

                    <!-- Title -->

    <script>
        // Create stars
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const starsCount = 50;
            
            for (let i = 0; i < starsCount; i++) {
                const star = document.createElement('div');
                star.className = 'absolute w-1 h-1 bg-white rounded-full animate-twinkle';
                star.style.top = Math.random() * 100 + '%';
                star.style.left = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                starsContainer.appendChild(star);
            }
        }
        
        // Create stars on page load
        window.addEventListener('load', createStars);
        
        // Selection state
        let selectedSeason = 'Spring';
        let selectedOccasion = 'Work';
        let selectedFamily = 'Any';

        // Scent families (order shown in the dropdown and browse buttons)
        const FAMILIES = [
            "Citrus & Fresh", "Aquatic & Marine", "Green & Herbal", "Floral", "Woody",
            "Smoky & Incense", "Leather", "Amber & Resinous", "Gourmand & Boozy", "Spicy"
        ];

        // Initialize with defaults
        document.addEventListener('DOMContentLoaded', function() {
            selectSeason('Spring');
            selectOccasion('Work');
            buildFamilyControls();
        });

        // Populate the family dropdown (picker) and the browse buttons
        function buildFamilyControls() {
            const select = document.getElementById('family-select');
            const buttons = document.getElementById('family-buttons');
            FAMILIES.forEach(fam => {
                const count = fragrances.filter(f => f.family === fam).length;

                const opt = document.createElement('option');
                opt.value = fam;
                opt.textContent = `${fam} (${count})`;
                select.appendChild(opt);

                const btn = document.createElement('button');
                btn.textContent = `${fam} (${count})`;
                btn.setAttribute('onclick', `browseFamily('${fam.replace(/'/g, "\\'")}')`);
                btn.className = 'family-btn bg-retro-blue text-white border-2 border-gray-400 rounded p-3 font-mono text-xs md:text-sm hover:bg-blue-700 hover:border-retro-cyan transition-all duration-200 transform hover:scale-105';
                buttons.appendChild(btn);
            });
        }

        function selectFamily(family) {
            selectedFamily = family;
        }

        // Browse: show every fragrance in the chosen family, with its season + occasion
        function browseFamily(family) {
            // Highlight active browse button
            document.querySelectorAll('.family-btn').forEach(btn => {
                const isActive = btn.textContent.startsWith(family + ' (');
                btn.classList.toggle('bg-retro-cyan', isActive);
                btn.classList.toggle('text-black', isActive);
                btn.classList.toggle('border-retro-magenta', isActive);
                btn.classList.toggle('bg-retro-blue', !isActive);
                btn.classList.toggle('text-white', !isActive);
                btn.classList.toggle('border-gray-400', !isActive);
            });

            const matches = fragrances
                .filter(f => f.family === family)
                .sort((a, b) => a.name.localeCompare(b.name));

            const rows = matches.map(f => `
                <div class="flex justify-between items-baseline gap-3 py-1 border-b border-gray-800">
                    <span class="text-retro-yellow">${f.name}</span>
                    <span class="text-retro-cyan whitespace-nowrap text-xs">${f.season} &middot; ${f.occasion}</span>
                </div>`).join('');

            document.getElementById('family-list').innerHTML = `
                <div class="text-white mb-2 text-center">${family} &mdash; ${matches.length} fragrance${matches.length === 1 ? '' : 's'}</div>
                ${rows}`;
        }
        
        function selectSeason(season) {
            selectedSeason = season;
            
            // Reset all season buttons
            document.querySelectorAll('.season-btn').forEach(btn => {
                btn.classList.remove('bg-retro-cyan', 'text-black', 'border-retro-magenta');
                btn.classList.add('bg-retro-blue', 'text-white', 'border-gray-400');
            });
            
            // Highlight selected button
            const selectedBtn = document.getElementById(`season-${season.toLowerCase().replace(/[^a-z]/g, '')}`);
            if (selectedBtn) {
                selectedBtn.classList.remove('bg-retro-blue', 'text-white', 'border-gray-400');
                selectedBtn.classList.add('bg-retro-cyan', 'text-black', 'border-retro-magenta');
            }
        }
        
        function selectOccasion(occasion) {
            selectedOccasion = occasion;
            
            // Reset all occasion buttons
            document.querySelectorAll('.occasion-btn').forEach(btn => {
                btn.classList.remove('bg-retro-cyan', 'text-black', 'border-retro-magenta');
                btn.classList.add('bg-retro-blue', 'text-white', 'border-gray-400');
            });
            
            // Highlight selected button
            let btnId = '';
            switch(occasion) {
                case 'Work': btnId = 'occasion-work'; break;
                case 'Date Night': btnId = 'occasion-date'; break;
                case 'Going Out': btnId = 'occasion-goingout'; break;
                case 'Crowded Spaces': btnId = 'occasion-crowd'; break;
                case 'Casual Outdoor': btnId = 'occasion-outdoor'; break;
            }
            
            const selectedBtn = document.getElementById(btnId);
            if (selectedBtn) {
                selectedBtn.classList.remove('bg-retro-blue', 'text-white', 'border-gray-400');
                selectedBtn.classList.add('bg-retro-cyan', 'text-black', 'border-retro-magenta');

        function pickFragrance() {
            const season = selectedSeason;
            const occasion = selectedOccasion;
            const family = selectedFamily;
            const resultElement = document.getElementById("result");

            // Show loading message
            resultElement.innerHTML = '<div class="animate-pulse">What will the smell be today?</div>';

            // Simulate loading time for authentic retro feeling
            setTimeout(() => {
                const filtered = fragrances.filter(f =>
                    (f.season === season || f.season === "Anytime" || season === "Anytime") &&
                    f.occasion === occasion &&
                    (family === "Any" || f.family === family)
                );

                if (filtered.length > 0) {
                    const selection = filtered[Math.floor(Math.random() * filtered.length)];
                    resultElement.innerHTML = `
                        <div class="animate-pulse">
                            <div class="text-retro-yellow mb-2">*********************</div>
                            <div class="text-white mb-1">TODAY'S FRAGRANCE:</div>
                            <div class="text-retro-yellow text-xl font-bold mb-2">${selection.name}</div>
                            <div class="text-retro-cyan text-sm mb-2">${selection.family}</div>
                            <div class="text-retro-yellow">*********************</div>
                        </div>
                    `;
                } else {
                    resultElement.innerHTML = '<div class="text-retro-red animate-pulse">NO MATCH FOUND! TRY DIFFERENT CRITERIA!</div>';
                }
            }, 1500);
        }
